# Skip configuration for LiveTranslationFeature module

build:
  contents:
    - block: 'android'
      contents:
        - 'compileOptions.isCoreLibraryDesugaringEnabled = true'
    - 'repositories { flatDir { dirs(rootProject.file("LiveTranslationFeature/src/main/kotlin/libs")) }; mavenCentral(); google() }'
    - block: 'dependencies'
      contents:
        - 'implementation(":chat-guest-release-20260304@aar")'
        - 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
        - 'implementation("com.squareup.okhttp3:okhttp:4.12.0")'
        - 'implementation("com.squareup.okhttp3:logging-interceptor:4.12.0")'
        - 'implementation("com.squareup.retrofit2:retrofit:2.11.0")'
        - 'implementation("org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3")'
        - 'implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0")'
