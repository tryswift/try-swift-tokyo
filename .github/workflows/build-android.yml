name: Build Android

on:
  pull_request:
    branches:
      - main
    paths:
      - "Android/**"
      - "SharedModels/**"
      - "DataClient/**"
      - ".github/workflows/build-android.yml"
  push:
    paths:
      - "Android/**"
      - "SharedModels/**"
      - "DataClient/**"
      - ".github/workflows/build-android.yml"

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current
          add-job-summary: never

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v5
        with:
          key: spm-android-${{ runner.os }}-swift-6.2-${{ hashFiles('Android/Package.resolved', 'Android/Package.swift') }}
          restore-keys: spm-android-${{ runner.os }}-swift-6.2-
          path: Android/.build

      - name: Check environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          which gradle || echo "gradle not in PATH"
          gradle --version || echo "gradle version failed"

      - name: Build
        run: |
          cd Android
          swift build 2>&1
