name: Deploy API Server (Production)

on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - "SharedModels/**"
      - "DataClient/**"
      # Server links WebShared and WebSponsor libraries from the Web package
      # and copies Web/Assets/images into the production image, so any change
      # under Web/ should redeploy. LocalizationGenerated is a transitive dep
      # of Web's WebConference target and must also be available for
      # `swift package resolve` to succeed inside the Docker build stage.
      - "Web/**"
      - "LocalizationGenerated/**"
      - "fly.production.toml"
  workflow_dispatch:

# Serialize prod deploys: the Fly.io remote builder is shared per-app, and
# running two `flyctl deploy` jobs in parallel makes them fight for builder
# RAM and OOM-kill the Swift compiler partway through the build. Cancel the
# in-progress run when a newer commit lands on main so only the latest deploy
# proceeds.
concurrency:
  group: deploy-api-server-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io (Production)
        run: flyctl deploy --remote-only --config fly.production.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
