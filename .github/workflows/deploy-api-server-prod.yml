name: Deploy API Server (Production)

on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - "SharedModels/**"
      - "DataClient/**"
      # Server/Dockerfile copies static images from Web/Assets/images into the
      # production image. Trigger a redeploy when those assets change so prod
      # never serves stale images.
      - "Web/Assets/images/**"
      - "fly.production.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io (Production)
        run: flyctl deploy --remote-only --config fly.production.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
