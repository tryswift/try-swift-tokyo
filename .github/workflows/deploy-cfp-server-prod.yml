name: Deploy CfP Server (Production)

on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - "MyLibrary/Sources/SharedModels/**"
      - "DataClient/**"
      - "fly.production.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1

      - name: Deploy to Fly.io (Production)
        run: flyctl deploy --remote-only --config fly.production.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
