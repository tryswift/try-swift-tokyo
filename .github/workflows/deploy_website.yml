name: Deploy website to Cloudflare Pages

on:
  push:
    branches:
      - "main"
    paths:
      - "Web/Sources/WebConference/**"
      - "Web/Assets/**"
      - "Web/Package.swift"
      - "Web/Package.resolved"
      - "SharedModels/**"
      - "trySwiftTokyo.xcworkspace/xcshareddata/swiftpm/Package.resolved"
      - ".github/workflows/deploy_website.yml"
      - "Conference/Sources/SponsorFeature/Media.xcassets/**"
      - "Conference/Sources/ScheduleFeature/Media.xcassets/**"
      - "DataClient/Sources/DataClient/Resources/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "6.3"
          skip-verify-signature: true

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v5
        with:
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
          path: .build

      - name: Build and Run Website
        run: |
          cd Web
          swift run WebConference

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy Web/Build --project-name=tryswift
