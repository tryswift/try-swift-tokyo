name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - "main"
    paths:
      - "Website/Sources/**"
      - "Website/Assets/**"
      - "SharedModels/**"
      - "trySwiftTokyo.xcworkspace/xcshareddata/swiftpm/Package.resolved"
      - ".github/workflows/deploy_website.yml"
      - "iOS/Sources/SponsorFeature/Media.xcassets/**"
      - "iOS/Sources/ScheduleFeature/Media.xcassets/**"
      - "DataClient/Sources/DataClient/Resources/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.2"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
          path: .build

      - name: Build and Run Website
        run: |
          cd Website
          swift run Website

      - name: Create CfP redirect to Fly.io SSR
        run: |
          mkdir -p Website/Build/cfp
          cat > Website/Build/cfp/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=https://cfp.tryswift.jp/">
            <title>Redirecting to CfP...</title>
          </head>
          <body>
            <p>Redirecting to <a href="https://cfp.tryswift.jp/">try! Swift Tokyo CfP</a>...</p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: "./Website/Build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
