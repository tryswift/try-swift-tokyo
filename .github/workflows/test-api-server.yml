name: Test API Server

on:
  push:
    paths:
      - "Server/**"
      - "SharedModels/**"
      - ".github/workflows/test-api-server.yml"

jobs:
  test:
    name: Test Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "6.3"
          skip-verify-signature: true

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v5
        with:
          key: spm-server-${{ runner.os }}-swift-6.3-${{ hashFiles('Server/Package.resolved', 'Server/Package.swift') }}
          restore-keys: spm-server-${{ runner.os }}-swift-6.3-
          path: Server/.build

      - name: Test
        run: |
          cd Server
          swift test
