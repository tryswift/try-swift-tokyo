name: Sync Individual Sponsors from Luma

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: luma-sponsor-sync-qydkgwtf
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run Luma sync script
        id: sync
        env:
          LUMA_API_KEY: ${{ secrets.LUMA_API_KEY }}
          LUMA_EVENT_ID: "evt-WHT17EaVs2of1Gs"
          LUMA_EVENT_SLUG: "qydkgwtf"
          YEAR: "2026"
        run: python .github/scripts/sync_luma_sponsors.py

      - name: Create Pull Request
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "Add new individual sponsors from Luma"
          title: "Add new individual sponsors from Luma"
          body: |
            Automated sync from Luma event registrations.

            **New sponsors added:**
            ${{ steps.sync.outputs.new_sponsors }}

            Please review the sponsor names, images, and links before merging.
          branch: luma-sponsor-sync-qydkgwtf
          delete-branch: true
          labels: sponsors,automated
