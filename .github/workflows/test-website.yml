name: Test Website
permissions:
  contents: read

on:
  push:
    paths:
      - "Website/**"
      - "SharedModels/**"
      - "DataClient/**"
      - "LocalizationGenerated/**"
      - ".github/workflows/test-website.yml"

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "6.3"
          skip-verify-signature: true

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v5
        with:
          key: spm-website-${{ runner.os }}-swift-6.3-${{ hashFiles('Website/Package.resolved', 'Website/Package.swift') }}
          restore-keys: spm-website-${{ runner.os }}-swift-6.3-
          path: Website/.build

      - name: Build
        run: |
          cd Website
          swift build
