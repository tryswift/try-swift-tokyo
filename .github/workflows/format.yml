name: Format

on:
  pull_request:
    branches:
      - main

jobs:
  swift_format:
    name: swift-format
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: write
    container: swift:6.2
    steps:
      - name: Checkout (non-fork PR)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: ${{ !github.event.pull_request.head.repo.fork }}
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout (fork PR)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: ${{ github.event.pull_request.head.repo.fork }}
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Configure safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Format
        run: swift format --ignore-unparsable-files --in-place --recursive ./Android/ ./App/ ./DataClient/ ./iOS/ ./LocalizationGenerated/ ./Server/ ./Shared/ ./SharedModels/ ./Website/
      - name: Check diff (fork PR)
        if: ${{ github.event.pull_request.head.repo.fork }}
        run: git diff --exit-code
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        id: auto-commit
        if: ${{ !github.event.pull_request.head.repo.fork }}
        with:
          commit_message: "[ci skip] Run swift-format"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Report swift-format status on auto-commit
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'swift-format',
              head_sha: '${{ steps.auto-commit.outputs.commit_hash }}',
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'swift-format',
                summary: 'Code was auto-formatted by CI.'
              }
            });
